<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="AI Writer's Hub is an AI-powered writing tool that helps users generate high-quality content, including emails, summaries, and social media posts, using the Groq AI API.">
  <meta property="og:title" content="AI Writer's Hub">
  <meta property="og:description" content="AI Writer's Hub is an AI-powered writing tool that helps users generate high-quality content, including emails, summaries, and social media posts, using the Groq AI API.">
  <title>AI Writer's Hub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;200;300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #0a0a0b; color: #e4e4e7; min-height: 100vh;
      display: flex; flex-direction: column; align-items: center;
    }
    .container { max-width: 800px; width: 100%; padding: 24px; margin: 0 auto; }
    h1 { font-size: 2.5rem; font-weight: 700; margin-bottom: 8px; 
      background: linear-gradient(135deg, #3b82f6, #8b5cf6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .subtitle { color: #a1a1aa; font-size: 1.1rem; margin-bottom: 32px; }
    .card { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px; padding: 24px; margin-bottom: 16px; backdrop-filter: blur(10px); }
    button { background: linear-gradient(135deg, #3b82f6, #2563eb); color: white;
      border: none; padding: 12px 24px; border-radius: 8px; font-size: 1rem;
      cursor: pointer; transition: all 0.2s; font-weight: 500; }
    button:hover { transform: scale(1.05); box-shadow: 0 4px 15px rgba(59,130,246,0.4); }
    button:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    input, textarea, select { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.2);
      color: #e4e4e7; padding: 12px 16px; border-radius: 8px; font-size: 1rem; width: 100%;
      outline: none; transition: border-color 0.2s; }
    input:focus, textarea:focus { border-color: #3b82f6; }
    .footer { margin-top: auto; padding: 24px; text-align: center; color: #52525b; font-size: 0.85rem; }
    .loading { display: inline-block; width: 20px; height: 20px; border: 2px solid rgba(255,255,255,0.3);
      border-radius: 50%; border-top-color: #3b82f6; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    @media (max-width: 640px) { .container { padding: 16px; } h1 { font-size: 1.8rem; } }
  </style>
</head>
<body>
  <header>
    <h1>AI Writer's Hub</h1>
    <p class="subtitle">AI-powered writing tool for high-quality content generation</p>
  </header>
  <main class="container">
    <div class="card">
      <h2>Email Generator</h2>
      <textarea id="email-prompt" placeholder="Enter your email prompt..."></textarea>
      <button id="email-button" onclick="generateEmail()">Generate Email</button>
      <div id="email-output" class="card"></div>
    </div>
    <div class="card">
      <h2>Summarizer</h2>
      <textarea id="summarizer-prompt" placeholder="Enter your text to summarize..."></textarea>
      <button id="summarizer-button" onclick="summarizeText()">Summarize</button>
      <div id="summarizer-output" class="card"></div>
    </div>
    <div class="card">
      <h2>Rewriter</h2>
      <textarea id="rewriter-prompt" placeholder="Enter your text to rewrite..."></textarea>
      <button id="rewriter-button" onclick="rewriteText()">Rewrite</button>
      <div id="rewriter-output" class="card"></div>
    </div>
    <div class="card">
      <h2>Tweet Composer</h2>
      <textarea id="tweet-prompt" placeholder="Enter your tweet prompt..."></textarea>
      <button id="tweet-button" onclick="composeTweet()">Compose Tweet</button>
      <div id="tweet-output" class="card"></div>
    </div>
  </main>
  <footer class="footer">
    Built with ❤️ by AI App Factory
  </footer>
  <script>
    async function generateEmail() {
      const prompt = document.getElementById('email-prompt').value;
      const button = document.getElementById('email-button');
      button.disabled = true;
      button.innerHTML = '<span class="loading"></span> Thinking...';
      try {
        const response = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ prompt: prompt, type: 'email' })
        });
        const data = await response.json();
        document.getElementById('email-output').innerHTML = data.result;
      } catch (error) {
        document.getElementById('email-output').innerHTML = 'Error: ' + error.message;
      } finally {
        button.disabled = false;
        button.innerHTML = 'Generate Email';
      }
    }

    async function summarizeText() {
      const prompt = document.getElementById('summarizer-prompt').value;
      const button = document.getElementById('summarizer-button');
      button.disabled = true;
      button.innerHTML = '<span class="loading"></span> Thinking...';
      try {
        const response = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ prompt: prompt, type: 'summarize' })
        });
        const data = await response.json();
        document.getElementById('summarizer-output').innerHTML = data.result;
      } catch (error) {
        document.getElementById('summarizer-output').innerHTML = 'Error: ' + error.message;
      } finally {
        button.disabled = false;
        button.innerHTML = 'Summarize';
      }
    }

    async function rewriteText() {
      const prompt = document.getElementById('rewriter-prompt').value;
      const button = document.getElementById('rewriter-button');
      button.disabled = true;
      button.innerHTML = '<span class="loading"></span> Thinking...';
      try {
        const response = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ prompt: prompt, type: 'rewrite' })
        });
        const data = await response.json();
        document.getElementById('rewriter-output').innerHTML = data.result;
      } catch (error) {
        document.getElementById('rewriter-output').innerHTML = 'Error: ' + error.message;
      } finally {
        button.disabled = false;
        button.innerHTML = 'Rewrite';
      }
    }

    async function composeTweet() {
      const prompt = document.getElementById('tweet-prompt').value;
      const button = document.getElementById('tweet-button');
      button.disabled = true;
      button.innerHTML = '<span class="loading"></span> Thinking...';
      try {
        const response = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ prompt: prompt, type: 'tweet' })
        });
        const data = await response.json();
        document.getElementById('tweet-output').innerHTML = data.result;
      } catch (error) {
        document.getElementById('tweet-output').innerHTML = 'Error: ' + error.message;
      } finally {
        button.disabled = false;
        button.innerHTML = 'Compose Tweet';
      }
    }
  </script>
</body>
</html>
